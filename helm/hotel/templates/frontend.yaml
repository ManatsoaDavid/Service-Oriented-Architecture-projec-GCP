apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: hotel
  labels:
    app.kubernetes.io/name: hotel
    app.kubernetes.io/instance: {{ .Release.Name }}
    app: hotel-frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app: hotel-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: hotel-frontend
    spec:
      containers:
        - name: frontend
          image: {{ .Values.images.frontend.repository }}:{{ .Values.images.frontend.tag }}
          imagePullPolicy: {{ .Values.images.frontend.pullPolicy }}
          ports:
            - containerPort: 80
              name: http

          # Monter le nginx.conf depuis le ConfigMap
          # (identique au nginx.conf local — les noms K8s correspondent !)
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf

          resources:
            requests:
              cpu: {{ .Values.frontend.resources.requests.cpu }}
              memory: {{ .Values.frontend.resources.requests.memory }}
            limits:
              cpu: {{ .Values.frontend.resources.limits.cpu }}
              memory: {{ .Values.frontend.resources.limits.memory }}

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10

      volumes:
        - name: nginx-config
          configMap:
            name: hotel-nginx-conf

---
apiVersion: v1
kind: Service
metadata:
  name: hotel-frontend
  namespace: hotel
  labels:
    app.kubernetes.io/name: hotel
    app.kubernetes.io/instance: {{ .Release.Name }}
    app: hotel-frontend
spec:
  type: ClusterIP
  selector:
    app: hotel-frontend
  ports:
    - port: 80
      targetPort: 80
      name: http
