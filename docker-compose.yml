version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Démonstration Architecture SOA — Hotel Grand Palace
#
# 3 services indépendants, 3 langages, 1 réseau commun :
#   • frontend          : HTML/JS/nginx     → port 80
#   • service-chambres  : Python/Flask      → port 5001
#   • service-reservation : Node.js/Express → port 5002
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── SERVICE CHAMBRES (Python / Flask) ─────────────────────────────────────
  service-chambres:
    build:
      context: ./service-chambres
      dockerfile: Dockerfile
    container_name: service-chambres
    restart: unless-stopped
    ports:
      - "5001:5001"
    networks:
      - soa-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── SERVICE RESERVATION (Node.js / Express) ────────────────────────────────
  service-reservation:
    build:
      context: ./service-reservation
      dockerfile: Dockerfile
    container_name: service-reservation
    restart: unless-stopped
    ports:
      - "5002:5002"
    networks:
      - soa-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5002/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── FRONTEND (HTML/JS servi par nginx) ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    networks:
      - soa-network
    depends_on:
      - service-chambres
      - service-reservation

# ── RÉSEAU SOA ─────────────────────────────────────────────────────────────
networks:
  soa-network:
    driver: bridge
    name: hotel-soa-network
